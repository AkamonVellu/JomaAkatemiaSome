<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JoMa pelaajakortit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Bebas+Neue&family=JetBrains+Mono:wght@400;700&family=Playfair+Display:ital,wght@1,700;1,900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --joma-red: #c8102e;
    --joma-red-dark: #8f0a1f;
    --joma-black: #0a0a0a;
    --joma-charcoal: #1a1a1a;
    --gold: #d4af37;
    --gold-bright: #f0c95a;
    --cream: #f5f1e8;
  }

  html, body {
    min-height: 100vh;
    background:
      radial-gradient(ellipse at top left, #1a1a1a 0%, transparent 50%),
      radial-gradient(ellipse at bottom right, #2a0a0a 0%, transparent 50%),
      #0a0a0a;
    font-family: 'Inter', sans-serif;
    color: #fff;
    padding: 30px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 30px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    z-index: 9999;
  }

  /* ===== TYÖKALUPALKKI ===== */
  .toolbar {
    width: 100%;
    max-width: 800px;
    background: rgba(20, 20, 20, 0.6);
    border: 1px solid rgba(212, 175, 55, 0.3);
    backdrop-filter: blur(10px);
    padding: 20px;
    border-radius: 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    align-items: center;
    justify-content: space-between;
  }

  .toolbar-section {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  .toolbar label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--gold);
    text-transform: uppercase;
  }

  .toolbar select, .toolbar button {
    background: var(--joma-black);
    color: #fff;
    border: 1px solid var(--gold);
    padding: 8px 14px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
  }

  .toolbar select { min-width: 220px; }

  .toolbar button:hover {
    background: var(--gold);
    color: var(--joma-black);
  }

  .toolbar button.primary {
    background: var(--joma-red);
    border-color: var(--joma-red);
  }
  .toolbar button.primary:hover {
    background: var(--gold);
    color: var(--joma-black);
    border-color: var(--gold);
  }

  .player-counter {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: rgba(255, 255, 255, 0.6);
    letter-spacing: 1px;
  }

  /* ===== EDITORI ===== */
  .editor {
    width: 100%;
    max-width: 800px;
    background: rgba(20, 20, 20, 0.6);
    border: 1px solid rgba(212, 175, 55, 0.2);
    padding: 20px;
    border-radius: 12px;
    display: none;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .editor.open { display: grid; }

  .editor-field {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .editor-field.full { grid-column: 1 / -1; }

  .editor-field label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--gold);
    text-transform: uppercase;
  }

  .editor-field input, .editor-field textarea, .editor-field select {
    background: var(--joma-black);
    color: #fff;
    border: 1px solid rgba(212, 175, 55, 0.4);
    padding: 8px 10px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    border-radius: 4px;
  }

  .editor-field textarea {
    resize: vertical;
    min-height: 60px;
    font-family: 'Playfair Display', serif;
    font-style: italic;
  }

  .editor-hint {
    grid-column: 1 / -1;
    font-size: 11px;
    color: rgba(255, 255, 255, 0.5);
    font-style: italic;
  }

  /* ===== CARD ===== */
  .card {
    width: 400px;
    height: 600px;
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    box-shadow:
      0 30px 60px rgba(0, 0, 0, 0.7),
      0 0 0 2px var(--gold),
      0 0 0 4px var(--joma-black),
      0 0 100px rgba(200, 16, 46, 0.3);
    background: var(--joma-black);
    transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .card:hover {
    transform: translateY(-8px) scale(1.01);
  }

  .bg-image {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: 50% 25%;
    z-index: 1;
  }

  .gradient-overlay {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(
        to bottom,
        rgba(10, 10, 10, 0.15) 0%,
        rgba(10, 10, 10, 0.05) 30%,
        rgba(10, 10, 10, 0.4) 55%,
        rgba(10, 10, 10, 0.9) 75%,
        rgba(10, 10, 10, 0.98) 100%
      );
    z-index: 2;
  }

  .stripe-overlay {
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(
      -45deg,
      transparent 0,
      transparent 30px,
      rgba(200, 16, 46, 0.04) 30px,
      rgba(200, 16, 46, 0.04) 32px
    );
    z-index: 3;
    pointer-events: none;
  }

  .frame {
    position: absolute;
    inset: 16px;
    border: 1px solid var(--gold);
    z-index: 10;
    pointer-events: none;
    border-radius: 4px;
  }
  .frame::before, .frame::after {
    content: '';
    position: absolute;
    width: 18px;
    height: 18px;
    border: 2px solid var(--gold-bright);
  }
  .frame::before { top: -4px; left: -4px; border-right: none; border-bottom: none; }
  .frame::after { bottom: -4px; right: -4px; border-left: none; border-top: none; }

  .top-bar {
    position: absolute;
    top: 28px;
    left: 28px;
    right: 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 5;
  }

  .team-badge {
    background: var(--joma-black);
    color: var(--gold);
    padding: 7px 16px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 3px;
    border: 1px solid var(--gold);
    clip-path: polygon(8% 0, 100% 0, 92% 100%, 0% 100%);
    padding-left: 22px;
    padding-right: 22px;
  }

  .jersey-badge {
    background: var(--joma-red);
    color: #fff;
    padding: 6px 14px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 2px;
    border: 1px solid var(--gold);
    font-weight: 700;
  }

  .content {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 0 32px 32px;
    z-index: 5;
    color: #fff;
  }

  .name-block {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 16px;
    padding-bottom: 14px;
    border-bottom: 2px solid var(--gold);
  }

  .name-text {
    flex: 1;
  }

  .first-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 44px;
    line-height: 0.9;
    color: #fff;
    letter-spacing: 1px;
    text-shadow: 2px 2px 0 var(--joma-red);
  }

  .last-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    line-height: 1;
    color: var(--gold);
    letter-spacing: 4px;
    margin-top: 2px;
  }

  .nickname-block {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
  }

  .jersey-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    line-height: 0.95;
    color: var(--gold);
    letter-spacing: 2px;
    text-shadow:
      0 0 24px rgba(212, 175, 55, 0.7),
      2px 2px 0 var(--joma-black);
    white-space: nowrap;
  }

  .jersey-num:empty { display: none; }

  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 18px;
    margin-bottom: 14px;
    font-family: 'Oswald', sans-serif;
  }

  .info-item {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .info-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 2.5px;
    color: var(--gold);
    text-transform: uppercase;
    opacity: 0.85;
  }

  .info-value {
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    color: #fff;
    font-weight: 600;
    letter-spacing: 0.2px;
    line-height: 1.25;
  }

  .quote {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 12px;
    line-height: 1.45;
    color: rgba(255, 255, 255, 0.85);
    text-align: center;
    padding: 10px 4px 0;
    border-top: 1px dotted rgba(212, 175, 55, 0.4);
    position: relative;
  }

  .quote::before {
    content: '"';
    color: var(--joma-red);
    font-size: 18px;
    font-weight: 900;
    margin-right: 2px;
  }
  .quote::after {
    content: '"';
    color: var(--joma-red);
    font-size: 18px;
    font-weight: 900;
    margin-left: 2px;
  }

  .quote:empty {
    display: none;
  }

  .shine {
    position: absolute;
    top: -50%;
    left: -30%;
    width: 40%;
    height: 200%;
    background: linear-gradient(
      105deg,
      transparent 40%,
      rgba(255, 255, 255, 0.08) 50%,
      transparent 60%
    );
    transform: rotate(15deg);
    pointer-events: none;
    z-index: 4;
    animation: shine 6s ease-in-out infinite;
  }

  @keyframes shine {
    0%, 100% { transform: translateX(-100%) rotate(15deg); }
    50% { transform: translateX(500%) rotate(15deg); }
  }

  /* ===== KAIKKI KORTIT TILA ===== */
  .all-cards-stage {
    display: none;
    flex-wrap: wrap;
    gap: 30px;
    justify-content: center;
    max-width: 1400px;
  }

  body.all-cards-mode .toolbar { max-width: 1400px; }
  body.all-cards-mode .editor { display: none !important; }
  body.all-cards-mode .single-card-stage { display: none; }
  body.all-cards-mode .all-cards-stage { display: flex; }

  .single-card-stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .empty-state {
    color: rgba(255, 255, 255, 0.5);
    font-style: italic;
    text-align: center;
    padding: 40px;
    border: 1px dashed rgba(212, 175, 55, 0.3);
    border-radius: 12px;
    max-width: 500px;
  }

  /* Print */
  @media print {
    body {
      background: #fff;
      padding: 0;
    }
    body::before { display: none; }
    .toolbar, .editor { display: none !important; }
    .card {
      box-shadow: 0 0 0 2px var(--gold), 0 0 0 4px var(--joma-black);
      break-inside: avoid;
      page-break-inside: avoid;
      margin: 10mm auto;
    }
    .shine { display: none; }
    .all-cards-stage { gap: 10mm; }
  }
</style>
</head>
<body>

<!-- ===== TYÖKALUPALKKI ===== -->
<div class="toolbar">
  <div class="toolbar-section">
    <label>Pelaaja:</label>
    <select id="player-select"></select>
    <span class="player-counter" id="player-counter"></span>
  </div>
  <div class="toolbar-section">
    <button id="btn-edit">Muokkaa</button>
    <button id="btn-download" class="primary">Lataa PNG</button>
    <button id="btn-toggle-all">Näytä kaikki</button>
    <button onclick="window.print()">Tulosta</button>
  </div>
</div>

<!-- ===== EDITORI ===== -->
<div class="editor" id="editor">
  <div class="editor-field">
    <label>Etunimi</label>
    <input type="text" id="edit-firstName">
  </div>
  <div class="editor-field">
    <label>Sukunimi</label>
    <input type="text" id="edit-lastName">
  </div>
  <div class="editor-field">
    <label>Lempinimi (valinnainen)</label>
    <input type="text" id="edit-nickname" placeholder="esim. Lake">
  </div>
  <div class="editor-field">
    <label>Joukkue (yläoikea)</label>
    <select id="edit-team">
      <option>PSU1</option>
      <option>PSU2</option>
      <option>Suomensarja</option>
      <option>Maakuntasarja</option>
      <option>Ykköspesis</option>
      <option>Superpesis</option>
    </select>
  </div>
  <div class="editor-field">
    <label>Pelipaikka</label>
    <input type="text" id="edit-position" placeholder="esim. Kotiuttaja / Koppari">
  </div>
  <div class="editor-field">
    <label>Ikä</label>
    <input type="text" id="edit-age" placeholder="esim. 17">
  </div>
  <div class="editor-field">
    <label>Unelmaduuni</label>
    <input type="text" id="edit-dreamJob" placeholder="esim. Poliisi">
  </div>
  <div class="editor-field">
    <label>Toinen laji</label>
    <input type="text" id="edit-otherSport" placeholder="esim. Golf">
  </div>
  <div class="editor-field full">
    <label>Kuvaava teksti / sitaatti</label>
    <textarea id="edit-quote" placeholder="Lyhyt kuvaus pelaajasta..."></textarea>
  </div>
  <div class="editor-field full">
    <label>Kuva (klikkaa ladataksesi)</label>
    <input type="file" id="edit-image" accept="image/*">
  </div>
  <div class="editor-hint">Muutokset tallentuvat selaimen muistiin automaattisesti. Voit viedä koko datan JSON:na alla.</div>
  <div class="toolbar-section" style="grid-column: 1 / -1; justify-content: space-between;">
    <button id="btn-add-player">+ Lisää uusi pelaaja</button>
    <div class="toolbar-section">
      <button id="btn-delete-player" style="border-color: #c8102e; color: #ff6b7e;">Poista pelaaja</button>
      <button id="btn-export-json">Vie JSON</button>
      <button id="btn-import-json">Tuo JSON</button>
    </div>
  </div>
</div>

<!-- ===== KORTTI (yksittäinen) ===== -->
<div class="single-card-stage" id="single-stage">
  <div id="card-container"></div>
</div>

<!-- ===== KAIKKI KORTIT ===== -->
<div class="all-cards-stage" id="all-cards-stage"></div>

// ============================================
// KORTTI-HTML
// ============================================
function renderCard(p) {
  const nickname = p.nickname ? `<div class="jersey-num">"${escapeHtml(p.nickname.toUpperCase())}"</div>` : '';
  const quote = p.quote ? `<div class="quote">${escapeHtml(p.quote)}</div>` : '';
  const img = p.image
    ? `<img class="bg-image" src="${p.image}" alt="${escapeHtml(p.firstName)}">`
    : `<div class="bg-image" style="background: linear-gradient(135deg, #2a2a2a, #1a1a1a); display:flex; align-items:center; justify-content:center; color: #555; font-style: italic;">Ei kuvaa</div>`;

  return `
    <div class="card">
      ${img}
      <div class="gradient-overlay"></div>
      <div class="stripe-overlay"></div>
      <div class="shine"></div>
      <div class="frame"></div>
      <div class="top-bar">
        <div class="team-badge">JoMa · 2026</div>
        <div class="jersey-badge">★ ${escapeHtml(p.team || 'JoMa')} ★</div>
      </div>
      <div class="content">
        <div class="name-block">
          <div class="name-text">
            <div class="first-name">${escapeHtml((p.firstName || '').toUpperCase())}</div>
            <div class="last-name">${escapeHtml((p.lastName || '').toUpperCase())}</div>
          </div>
          <div class="nickname-block">${nickname}</div>
        </div>
        <div class="info-grid">
          <div class="info-item">
            <div class="info-label">Pelipaikka</div>
            <div class="info-value">${escapeHtml(p.position || '—')}</div>
          </div>
          <div class="info-item">
            <div class="info-label">Ikä</div>
            <div class="info-value">${escapeHtml(p.age || '—')}</div>
          </div>
          <div class="info-item">
            <div class="info-label">Unelmaduuni</div>
            <div class="info-value">${escapeHtml(p.dreamJob || '—')}</div>
          </div>
          <div class="info-item">
            <div class="info-label">Toinen laji</div>
            <div class="info-value">${escapeHtml(p.otherSport || '—')}</div>
          </div>
        </div>
        ${quote}
      </div>
    </div>
  `;
}

function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ============================================
// TILA
// ============================================
let currentId = null;
let editorOpen = false;

function getPlayer(id) {
  return players.find(p => p.id === id);
}

function uid() {
  return 'p_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

// ============================================
// RENDER
// ============================================
function refreshSelect() {
  const sel = document.getElementById('player-select');
  sel.innerHTML = players.map(p =>
    `<option value="${p.id}">${escapeHtml(p.firstName)} ${escapeHtml(p.lastName)}${p.nickname ? ' "' + p.nickname + '"' : ''}</option>`
  ).join('');
  if (currentId) sel.value = currentId;
  document.getElementById('player-counter').textContent = `${players.length} pelaajaa`;
}

function refreshCard() {
  const p = getPlayer(currentId);
  if (!p) {
    document.getElementById('card-container').innerHTML =
      '<div class="empty-state">Ei pelaajia. Klikkaa "+ Lisää uusi pelaaja" aloittaaksesi.</div>';
    return;
  }
  document.getElementById('card-container').innerHTML = renderCard(p);
}

function refreshAllCards() {
  document.getElementById('all-cards-stage').innerHTML =
    players.map(p => renderCard(p)).join('');
}

function refreshEditor() {
  const p = getPlayer(currentId);
  if (!p) return;
  document.getElementById('edit-firstName').value = p.firstName || '';
  document.getElementById('edit-lastName').value = p.lastName || '';
  document.getElementById('edit-nickname').value = p.nickname || '';
  document.getElementById('edit-team').value = p.team || 'PSU2';
  document.getElementById('edit-position').value = p.position || '';
  document.getElementById('edit-age').value = p.age || '';
  document.getElementById('edit-dreamJob').value = p.dreamJob || '';
  document.getElementById('edit-otherSport').value = p.otherSport || '';
  document.getElementById('edit-quote').value = p.quote || '';
}

function refreshAll() {
  refreshSelect();
  refreshCard();
  refreshAllCards();
  if (editorOpen) refreshEditor();
  saveToStorage();
}

// ============================================
// SELAIMEN TALLENNUS
// ============================================
const STORAGE_KEY = 'joma_pelaajakortit_v1';

function saveToStorage() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(players));
  } catch (e) { console.warn('localStorage tallennus epäonnistui:', e); }
}

function loadFromStorage() {
  try {
    const data = localStorage.getItem(STORAGE_KEY);
    if (data) {
      const parsed = JSON.parse(data);
      if (Array.isArray(parsed) && parsed.length > 0) {
        players = parsed;
      }
    }
  } catch (e) { console.warn('localStorage lataus epäonnistui:', e); }
}

// EDITORIN KENTTIEN KUUNTELU

function bindEditorField(id, key) {
  document.getElementById('edit-' + id).addEventListener('input', e => {
    const p = getPlayer(currentId);
    if (p) {
      p[key] = e.target.value;
      refreshAll();
    }
  });
}

bindEditorField('firstName', 'firstName');
bindEditorField('lastName', 'lastName');
bindEditorField('nickname', 'nickname');
bindEditorField('team', 'team');
bindEditorField('position', 'position');
bindEditorField('age', 'age');
bindEditorField('dreamJob', 'dreamJob');
bindEditorField('otherSport', 'otherSport');

// ============================================
// KUVAN LATAUS + KÄSITTELY
// ============================================
document.getElementById('edit-image').addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  const p = getPlayer(currentId);
  if (!p) return;

  // Lataa kuva, käsittele (kontrasti + saturaatio + tallennus)
  const dataUrl = await processImage(file);
  p.image = dataUrl;
  refreshAll();
});

async function processImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        // Skaalataan järkevään kokoon (max 800px leveys)
        const maxW = 800;
        const scale = img.width > maxW ? maxW / img.width : 1;
        const w = Math.round(img.width * scale);
        const h = Math.round(img.height * scale);

        const canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        // Filter: kevyt kontrasti ja saturaatio
        ctx.filter = 'contrast(1.1) saturate(1.15) brightness(1.03)';
        ctx.drawImage(img, 0, 0, w, h);

        resolve(canvas.toDataURL('image/jpeg', 0.88));
      };
      img.onerror = reject;
      img.src = ev.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ============================================
// NAPPIEN TOIMINNOT
// ============================================
document.getElementById('player-select').addEventListener('change', e => {
  currentId = e.target.value;
  refreshCard();
  if (editorOpen) refreshEditor();
});

document.getElementById('btn-edit').addEventListener('click', () => {
  editorOpen = !editorOpen;
  document.getElementById('editor').classList.toggle('open', editorOpen);
  if (editorOpen) refreshEditor();
});

document.getElementById('btn-add-player').addEventListener('click', () => {
  const newP = {
    id: uid(),
    firstName: 'Uusi',
    lastName: 'Pelaaja',
    nickname: '',
    team: 'PSU2',
    position: '',
    age: '',
    dreamJob: '',
    otherSport: '',
    quote: '',
    image: ''
  };
  players.push(newP);
  currentId = newP.id;
  refreshAll();
  refreshEditor();
});

document.getElementById('btn-delete-player').addEventListener('click', () => {
  const p = getPlayer(currentId);
  if (!p) return;
  if (!confirm(`Poistetaanko pelaaja ${p.firstName} ${p.lastName}?`)) return;
  players = players.filter(x => x.id !== currentId);
  currentId = players.length > 0 ? players[0].id : null;
  refreshAll();
});

document.getElementById('btn-toggle-all').addEventListener('click', e => {
  document.body.classList.toggle('all-cards-mode');
  e.target.textContent = document.body.classList.contains('all-cards-mode')
    ? 'Näytä yksi' : 'Näytä kaikki';
});

// PNG-vienti
document.getElementById('btn-download').addEventListener('click', async () => {
  const p = getPlayer(currentId);
  if (!p) return;
  await downloadCardAsPng(p);
});

async function downloadCardAsPng(player) {
  const cardEl = document.querySelector('#card-container .card');
  if (!cardEl) return;

  try {
    // html2canvas-pro renderöi kortin tarkasti 3x-resoluutiolla
    const canvas = await html2canvas(cardEl, {
      scale: 3,
      useCORS: true,
      backgroundColor: null,
      logging: false
    });
    const link = document.createElement('a');
    const safeName = `${player.firstName}_${player.lastName}`.replace(/[^a-zA-ZäöåÄÖÅ0-9_]/g, '_');
    link.download = `JoMa_${safeName}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch (e) {
    alert('PNG-vienti epäonnistui: ' + e.message + '\n\nVoit tulostaa kortin selaimen Print → Save as PDF -toiminnolla.');
    console.error(e);
  }
}

// JSON-vienti
document.getElementById('btn-export-json').addEventListener('click', () => {
  const data = JSON.stringify(players, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.download = 'joma_pelaajakortit.json';
  link.href = url;
  link.click();
  URL.revokeObjectURL(url);
});

// JSON-tuonti
document.getElementById('btn-import-json').addEventListener('click', () => {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'application/json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const parsed = JSON.parse(ev.target.result);
        if (Array.isArray(parsed)) {
          if (confirm(`Tuodaan ${parsed.length} pelaajaa. Korvataanko nykyinen lista?`)) {
            players = parsed;
            currentId = players[0]?.id || null;
            refreshAll();
          }
        } else {
          alert('Virheellinen tiedosto.');
        }
      } catch (err) {
        alert('JSON-tuonti epäonnistui: ' + err.message);
      }
    };
    reader.readAsText(file);
  };
  input.click();
});

// ============================================
// INIT
// ============================================
loadFromStorage();
if (players.length > 0) currentId = players[0].id;
refreshAll();
</script>
